ServerName localhost
# Pass container environment variables to CGI processes so CGI scripts can read them. 
PassEnv PHOTO_PX_H PHOTO_PX_W VIDEO_PX_H VIDEO_PX_W
LoadModule cgi_module modules/mod_cgi.so
DocumentRoot "/www"
ExpiresActive On
ExpiresDefault "access plus 1 month"
<Directory "/www">
    Options FollowSymLinks
    AllowOverride AuthConfig
    Require all granted
</Directory>

# Serve static files under /run, but only treat .sh and .cgi as CGI.
# This allows normal .html files to be served from /run/ while enabling CGI execution for shell/cgi scripts only.
Alias /run/ /www/run/
<Directory "/www/run">
    Options +FollowSymLinks +ExecCGI
    AllowOverride AuthConfig
    AddHandler cgi-script .sh .cgi
    Require all granted
    <FilesMatch "(\.(sh|cgi)$|^(status)$)">
        ExpiresActive Off
        Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
        Header set Pragma "no-cache"
    </FilesMatch>
</Directory>
